name: demand_forecasting
channels:
  - conda-forge
  - defaults
  - pytorch  # For PyTorch if needed
dependencies:
  # Python Version
  - python=3.10

  # Core Data Science
  - pandas=2.1.4
  - numpy=1.26.2
  - scipy=1.11.4

  # Machine Learning Core
  - scikit-learn=1.3.2

  # Time Series
  - statsmodels=0.14.1

  # Visualization
  - matplotlib=3.8.2
  - seaborn=0.13.0

  # Interactive Development
  - jupyter=1.0.0
  - notebook=7.0.6
  - jupyterlab=4.0.9
  - ipywidgets=8.1.1

  # Utilities
  - python-dateutil=2.8.2
  - pytz=2023.3
  - pyyaml=6.0.1
  - tqdm=4.66.1
  - joblib=1.3.2

  # Performance
  - dask=2024.1.0

  # Code Quality
  - pytest=7.4.3
  - black=23.12.1
  - flake8=7.0.0

  # Pip packages (not available in conda or better from pip)
  - pip
  - pip:
    # Gradient Boosting
    - xgboost==2.0.3
    - lightgbm==4.1.0
    - catboost==1.2.2
    
    # Time Series
    - prophet==1.1.5
    - pmdarima==2.0.4
    
    # Feature Engineering
    - category_encoders==2.6.3
    - feature-engine==1.6.2
    
    # Hyperparameter Optimization
    - optuna==3.5.0
    - scikit-optimize==0.9.0
    - hyperopt==0.2.7
    
    # Model Interpretation
    - shap==0.44.0
    - eli5==0.13.0
    - lime==0.2.0.1
    
    # Visualization
    - plotly==5.18.0
    - cufflinks==0.17.3
    
    # MLOps
    - mlflow==2.9.2
    - loguru==0.7.2
    
    # Data Validation
    - pandera==0.18.0
    - great-expectations==0.18.8
    
    # Utilities
    - python-dotenv==1.0.0
    - cloudpickle==3.0.0
    
    # Testing
    - pytest-cov==4.1.0
    - mypy==1.8.0
